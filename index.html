<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horários IFS - Campus Itabaiana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ifs: {
                            green: '#32A041',
                            red: '#CB333B',
                            dark: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Spinner de Loading */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #32A041;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <header class="bg-ifs-green text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href = window.location.pathname">
                <div class="bg-white text-ifs-green p-2 rounded-full font-bold text-xl">
                    <i class="fa-solid fa-building-columns"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">IFS - Itabaiana</h1>
                    <p class="text-xs opacity-90">Gestão de Horários</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-full hover:bg-green-700 transition">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:inline"></i>
                </button>
                
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-6">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 dark:text-gray-400">Sincronizando com Google Drive...</p>
        </div>

        <div id="view-home" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-ifs-green border-b border-gray-300 dark:border-gray-700 pb-2">
                Salas e Laboratórios
            </h2>
            <div id="lista-salas" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
            <p id="msg-vazio" class="hidden text-center text-gray-500 mt-10">Nenhum horário cadastrado ainda.</p>
        </div>

        <div id="view-grade" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                <div>
                    <button onclick="voltarHome()" class="text-ifs-green hover:underline mb-1 text-sm">
                        <i class="fa-solid fa-arrow-left"></i> Voltar
                    </button>
                    <h2 id="titulo-sala" class="text-3xl font-bold text-gray-800 dark:text-white"></h2>
                </div>
                <div class="text-sm bg-yellow-100 text-yellow-800 px-3 py-1 rounded border border-yellow-200 dark:bg-yellow-900 dark:text-yellow-200 dark:border-yellow-800">
                    <i class="fa-regular fa-clock"></i> 2026.1
                </div>
            </div>

            <div class="overflow-x-auto rounded-lg shadow border border-gray-200 dark:border-gray-700">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-white uppercase bg-ifs-green">
                        <tr>
                            <th scope="col" class="px-4 py-3 min-w-[100px]">Horário</th>
                            <th scope="col" class="px-4 py-3 min-w-[120px]">Segunda</th>
                            <th scope="col" class="px-4 py-3 min-w-[120px]">Terça</th>
                            <th scope="col" class="px-4 py-3 min-w-[120px]">Quarta</th>
                            <th scope="col" class="px-4 py-3 min-w-[120px]">Quinta</th>
                            <th scope="col" class="px-4 py-3 min-w-[120px]">Sexta</th>
                            <th scope="col" class="px-4 py-3 min-w-[120px]">Sábado</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-gray-200 dark:bg-gray-800 text-center py-4 text-sm text-gray-600 dark:text-gray-400 mt-auto">
        <p>&copy; 2026 Instituto Federal de Sergipe - Campus Itabaiana</p>
    </footer>

    <div id="modal-login" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[60]">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl w-full max-w-xs">
            <h3 class="text-lg font-bold mb-4 text-gray-900 dark:text-white">Acesso Administrativo</h3>
            <input type="password" id="adminPass" placeholder="Senha" class="w-full p-2 border rounded mb-4 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            <div class="flex justify-end gap-2">
                <button onclick="fecharModal('modal-login')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded dark:text-gray-300 dark:hover:bg-gray-700">Cancelar</button>
                <button onclick="logarAdmin()" class="px-4 py-2 bg-ifs-green text-white rounded hover:bg-green-700">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[60]">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl w-full max-w-md mx-4">
            <h3 class="text-lg font-bold mb-4 text-ifs-green">Editar Horário</h3>
            <p id="edit-info" class="text-xs text-gray-500 mb-4 uppercase font-semibold"></p>
            
            <form id="form-editar" onsubmit="salvarAula(event)">
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium dark:text-gray-300">Disciplina</label>
                        <input type="text" id="input-disciplina" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium dark:text-gray-300">Professor</label>
                        <input type="text" id="input-professor" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium dark:text-gray-300">Turma</label>
                        <input type="text" id="input-turma" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" required>
                    </div>
                </div>
                
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" onclick="fecharModal('modal-editar')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded dark:text-gray-300 dark:hover:bg-gray-700">Cancelar</button>
                    <button type="submit" id="btn-salvar" class="px-4 py-2 bg-ifs-green text-white rounded hover:bg-green-700 flex items-center gap-2">
                        <span>Salvar</span>
                        <i id="save-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
